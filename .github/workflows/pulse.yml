name: Compete Pulse 🚀

on:
  schedule:
    # Run every day at 8:00 AM PST (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        required: true
        default: '2'
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install . pytest pytest-mock
          
      - name: Run Tests (Regression)
        run: |
          PYTHONPATH=src pytest tests/
          
      - name: Broadcast Updates
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          COMPETE_PULSE_SENDER_EMAIL: ${{ secrets.COMPETE_PULSE_SENDER_EMAIL || secrets.CompetePulse_SENDER_EMAIL }}
          COMPETE_PULSE_SENDER_PASSWORD: ${{ secrets.COMPETE_PULSE_SENDER_PASSWORD || secrets.CompetePulse_SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL || secrets.Recipient_Email }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          LOOKBACK_DAYS=${{ github.event.inputs.days || '1' }}
          
          if [ -n "$GCHAT_WEBHOOK_URL" ]; then
            compete-pulse chat --days "$LOOKBACK_DAYS"
          fi
          
          # Email Fallback (requires user-provided secrets)
          if [ -n "$COMPETE_PULSE_SENDER_EMAIL" ] && [ -n "$COMPETE_PULSE_SENDER_PASSWORD" ]; then
            TARGET_EMAIL=${RECIPIENT_EMAIL:-"ai-compete-pulse@google.com"}
            compete-pulse email "$TARGET_EMAIL" --days "$LOOKBACK_DAYS" --infographic
          fi

          # GitHub Issue Broadcaster (Secure, zero-config default)
          compete-pulse github --days "$LOOKBACK_DAYS"
