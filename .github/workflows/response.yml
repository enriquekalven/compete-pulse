name: Competitive Rapid Response 🛡️

on:
  workflow_dispatch:
    inputs:
      competitor_product:
        description: "Competitor product to analyze (e.g. 'Claude CoWork')"
        required: true
        default: 'Claude CoWork'
      target_product:
        description: "Google product to compare against (e.g. 'Agent Builder', 'ADK')"
        required: true
        default: 'Gemini Enterprise'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install .
          
      - name: Generate Rapid Response
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          echo "### Competitive Rapid Response: ${{ github.event.inputs.competitor_product }} vs ${{ github.event.inputs.target_product }}" >> $GITHUB_STEP_SUMMARY
          compete-pulse response "${{ github.event.inputs.competitor_product }}" --target "${{ github.event.inputs.target_product }}" --raw >> $GITHUB_STEP_SUMMARY
